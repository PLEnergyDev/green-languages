name: matrix-multiplication
language: rust
description: |
    Create two square matrices of size N×N.
    Each cell within these two matrices will be initialized with the sum of their row and column indices.
    Multiply the two matrices and output the contents of the last cell.
libgreen: true
code: |
    use std::ffi::CString;

    #[link(name = "green")]
    unsafe extern "C" {
        fn measure_start(metrics: *const std::ffi::c_char) -> *mut std::ffi::c_void;
        fn measure_stop(context: *mut std::ffi::c_void);
    }

    fn run_benchmark(n: usize) {
        let mut a = vec![0.0f64; n * n];
        let mut b = vec![0.0f64; n * n];
        let mut c = vec![0.0f64; n * n];

        for i in 0..n {
            for j in 0..n {
                let val = (i + j) as f64;
                a[i * n + j] = val;
                b[i * n + j] = val;
            }
        }

        let mut total_result = 0.0f64;
        for _ in 0..1000 {
            for i in 0..n {
                for j in 0..n {
                    let mut sum = 0.0f64;
                    for k in 0..n {
                        sum += a[i * n + k] * b[k * n + j];
                    }
                    c[i * n + j] = sum;
                }
            }
            total_result += c[n * n - 1];
        }

        println!("{:.0}", total_result / 1000.0);
    }

    fn main() {
        let args: Vec<String> = std::env::args().skip(1).collect();
        if args.len() < 3 {
            eprintln!("Usage: <program> <n> <internal_runs> <metrics>");
            std::process::exit(1);
        }

        let n: usize = args[0].parse().expect("Invalid integer");
        let internal_runs: usize = args[1].parse().expect("Invalid integer");
        let metrics = CString::new(args[2].as_str()).expect("Invalid metrics string");

        for _ in 0..internal_runs {
            unsafe {
                let context = measure_start(metrics.as_ptr());
                run_benchmark(n);
                measure_stop(context);
            }
        }
    }
arguments: [200]
compile_options: [--release]
expected_stdout: !!binary MTg0ODcxMDAK
---
name: release

