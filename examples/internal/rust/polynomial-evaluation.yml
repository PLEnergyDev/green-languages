name: polynomial-evaluation
language: rust
description: |
    This benchmark implements polynomial evaluation using Horner's rule.
    A polynomial of degree n has the form: c₀ + c₁x + c₂x² + ... + cₙxⁿ
    Instead of calculating each power of x separately (which would require n(n+1)/2 multiplications),
    Horner's rule rearranges the calculation to: c₀ + x(c₁ + x(c₂ + ... + x(cₙ₋₁ + xcₙ)...))
    This requires only n multiplications and n additions, making it much more efficient.
libgreen: true
code: |
    use std::ffi::CString;

    #[link(name = "green")]
    unsafe extern "C" {
        fn measure_start(metrics: *const std::ffi::c_char) -> *mut std::ffi::c_void;
        fn measure_stop(context: *mut std::ffi::c_void);
    }

    fn run_benchmark(degree: usize, x: f64) {
        let mut coeffs = vec![0.0; degree + 1];
        for i in 0..=degree {
            coeffs[degree - i] = 1.0 / (i + 1) as f64;
        }

        let mut result: f64 = 0.0f64;
        for _ in 0..1000000 {
            let mut eval: f64 = 0.0f64;
            for i in 0..=degree {
                eval = coeffs[i] + x * eval;
            }
            result += eval;
        }

        println!("{:.6}", result / 1000000.0);
    }

    fn main() {
        let args: Vec<String> = std::env::args().skip(1).collect();
        if args.len() < 4 {
            eprintln!("Usage: <program> <degree> <x> <internal_runs> <metrics>");
            std::process::exit(1);
        }

        let degree: usize = args[0].parse().expect("Invalid integer");
        let x: f64 = args[1].parse().expect("Invalid float");
        let internal_runs: usize = args[2].parse().expect("Invalid integer");
        let metrics = CString::new(args[3].as_str()).expect("Invalid metrics string");

        for _ in 0..internal_runs {
            let context = unsafe { measure_start(metrics.as_ptr()) };
            run_benchmark(degree, x);
            unsafe { measure_stop(context) };
        }
    }
arguments: [1000, 0.5]
compile_options: [--release]
expected_stdout: !!binary MS4zODYyOTQK
---
name: release

