name: division-loop
language: c
description: |
    Consider for a given M the problem of finding the least integer n such that 1/1 + 1/2 + 1/3 + ... + 1/n >= M.
    For M = 20 the answer is n = 272400600 and the loop performs that many runs.
    Each run involves a floating-point comparison, a floating-point division and a floating-point addition, as well as an integer increment.
libgreen: true
code: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <green.h>

    void run_benchmark(int m) {
        double sum = 0.0;
        int n = 0;
        while (sum < m) {
            n++;
            sum += 1.0 / n;
        }
        printf("%d\n", n);
    }

    int main(int argc, char **argv) {
        if (argc < 4) {
            fprintf(stderr, "Usage: %s <m> <internal_runs> <metrics>\n", argv[0]);
            return 1;
        }

        int m = atoi(argv[1]);
        int internal_runs = atoi(argv[2]);
        const char *metrics = argv[3];

        for (int i = 0; i < internal_runs; i++) {
            void *context = measure_start(metrics);
            run_benchmark(m);
            measure_stop(context);
        }

        return 0;
    }
arguments: [20]
compile_options: [-pipe, -O3, -march=native, -fomit-frame-pointer]
expected_stdout: !!binary MjcyNDAwNjAwCg==
