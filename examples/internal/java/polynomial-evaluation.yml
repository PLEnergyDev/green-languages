name: polynomial-evaluation
language: java
description: |
    This benchmark implements polynomial evaluation using Horner's rule.
    A polynomial of degree n has the form: c₀ + c₁x + c₂x² + ... + cₙxⁿ
    Instead of calculating each power of x separately (which would require n(n+1)/2 multiplications),
    Horner's rule rearranges the calculation to: c₀ + x(c₁ + x(c₂ + ... + x(cₙ₋₁ + xcₙ)...))
    This requires only n multiplications and n additions, making it much more efficient.
libgreen: true
code: |
    class Green {
        static { System.loadLibrary("green"); }
        public native long measureStart(String events);
        public native void measureStop(long context);
    }

    public class Program {
        static void run_benchmark(int degree, double x) {
            double[] coeffs = new double[degree + 1];
            for (int i = 0; i <= degree; i++) {
                coeffs[degree - i] = 1.0 / (i + 1);
            }

            double totalResult = 0.0;
            for (int r = 0; r < 1000000; r++) {
                double result = 0.0;
                for (int i = 0; i <= degree; i++) {
                    result = coeffs[i] + x * result;
                }
                totalResult += result;
            }

            System.out.printf("%.6f\n", totalResult / 1000000);
        }

        public static void main(String[] args) {
            if (args.length < 4) {
                System.err.println("Usage: <program> <degree> <x> <internal_runs> <metrics>");
                System.exit(1);
            }

            int degree = Integer.parseInt(args[0]);
            double x = Double.parseDouble(args[1]);
            int internal_runs = Integer.parseInt(args[2]);
            String metrics = args[3];

            Green green = new Green();

            for (int i = 0; i < internal_runs; i++) {
                long context = green.measureStart(metrics);
                run_benchmark(degree, x);
                green.measureStop(context);
            }
        }
    }
