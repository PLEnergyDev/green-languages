name: matrix-multiplication
language: cs
description: |
    Create two square matrices of size N×N.
    Each cell within these two matrices will be initialized with the sum of their row and column indices.
    Multiply the two matrices and output the contents of the last cell.
libgreen: true
code: |
    using System;
    using System.Runtime.InteropServices;

    public class Program {
        [DllImport("libgreen", EntryPoint = "measure_start")]
        public static extern IntPtr measure_start([MarshalAs(UnmanagedType.LPStr)] string metrics);

        [DllImport("libgreen", EntryPoint = "measure_stop")]
        public static extern void measure_stop(IntPtr context);

        static void run_benchmark(int n) {
            double[] A = new double[n * n];
            double[] B = new double[n * n];
            double[] C = new double[n * n];

            for (int i = 0; i < n; i++) {
                for (int j = 0; j < n; j++) {
                    A[i*n + j] = B[i*n + j] = i + j;
                }
            }

            double totalResult = 0.0;
            for (int r = 0; r < 1000; r++) {
                for (int i = 0; i < n; i++) {
                    for (int j = 0; j < n; j++) {
                        double sum = 0.0;
                        for (int k = 0; k < n; k++) {
                            sum += A[i*n + k] * B[k*n + j];
                        }
                        C[i*n + j] = sum;
                    }
                }
                totalResult += C[n*n - 1];
            }

            Console.WriteLine($"{totalResult / 1000:F0}");
        }

        public static void Main(string[] args) {
            if (args.Length < 3) {
                Console.Error.WriteLine("Usage: <program> <n> <internal_runs> <metrics>");
                Environment.Exit(1);
            }

            int n = int.Parse(args[0]);
            int internal_runs = int.Parse(args[1]);
            string metrics = args[2];

            for (int i = 0; i < internal_runs; i++) {
                IntPtr context = measure_start(metrics);
                run_benchmark(n);
                measure_stop(context);
            }
        }
    }
framework: net9.0
compile_options:
    - -c Release
    - -p:ImplicitUsings=enable
    - -p:Nullable=enable
    - -p:AllowUnsafeBlocks=true
    - -p:ServerGarbageCollection=true
    - -p:ConcurrentGarbageCollection=true
    - -p:UseSharedCompilation=false
    - -p:OptimizationPreference=Speed
    - -p:IlcInstructionSet=native
