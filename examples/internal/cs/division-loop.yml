name: division-loop
language: cs
description: |
    Consider for a given M the problem of finding the least integer n such that 1/1 + 1/2 + 1/3 + ... + 1/n >= M.
    For M = 20 the answer is n = 272400600 and the loop performs that many runs.
    Each run involves a floating-point comparison, a floating-point division and a floating-point addition, as well as an integer increment.
libgreen: true
code: |
    using System;
    using System.Runtime.InteropServices;

    public class Program {
        [DllImport("libgreen", EntryPoint = "measure_start")]
        public static extern IntPtr measure_start([MarshalAs(UnmanagedType.LPStr)] string metrics);

        [DllImport("libgreen", EntryPoint = "measure_stop")]
        public static extern void measure_stop(IntPtr context);

        static void run_benchmark(int m) {
            double sum = 0.0;
            int n = 0;
            while (sum < m) {
                n++;
                sum += 1.0 / n;
            }
            Console.WriteLine(n);
        }

        public static void Main(string[] args) {
            if (args.Length < 3) {
                Console.Error.WriteLine($"Usage: <program> <m> <internal_runs> <metrics>");
                Environment.Exit(1);
            }

            int m = int.Parse(args[0]);
            int internal_runs = int.Parse(args[1]);
            string metrics = args[2];

            for (int i = 0; i < internal_runs; i++) {
                IntPtr context = measure_start(metrics);
                run_benchmark(m);
                measure_stop(context);
            }
        }
    }
framework: net9.0
compile_options:
    - -c Release
    - -p:ImplicitUsings=enable
    - -p:Nullable=enable
    - -p:AllowUnsafeBlocks=true
    - -p:ServerGarbageCollection=true
    - -p:ConcurrentGarbageCollection=true
    - -p:UseSharedCompilation=false
    - -p:OptimizationPreference=Speed
    - -p:IlcInstructionSet=native
arguments: [20]
expected_stdout: !!binary MjcyNDAwNjAwCg==
