name: polynomial-evaluation
language: cpp
description: |
    This benchmark implements polynomial evaluation using Horner's rule.
    A polynomial of degree n has the form: c₀ + c₁x + c₂x² + ... + cₙxⁿ
    Instead of calculating each power of x separately (which would require n(n+1)/2 multiplications),
    Horner's rule rearranges the calculation to: c₀ + x(c₁ + x(c₂ + ... + x(cₙ₋₁ + xcₙ)...))
    This requires only n multiplications and n additions, making it much more efficient.
libgreen: true
code: |
    #include <iostream>
    #include <vector>
    #include <iomanip>
    #include <green.h>

    void run_benchmark(int degree, double x) {
        std::vector<double> coeffs(degree + 1);
        for (int i = 0; i <= degree; i++) {
            coeffs[degree - i] = 1.0 / (i + 1);
        }

        double result = 0.0;
        for (int r = 0; r < 1000000; r++) {
            double eval = 0.0;
            for (int i = 0; i <= degree; i++) {
                eval = coeffs[i] + x * eval;
            }
            result += eval;
        }

        std::cout << std::fixed << std::setprecision(6) << result / 1000000 << std::endl;
    }

    int main(int argc, char **argv) {
        if (argc < 5) {
            std::cerr << "Usage: " << argv[0] << " <degree> <x> <internal_runs> <metrics>\n";
            return 1;
        }

        int degree = std::stoi(argv[1]);
        double x = std::stod(argv[2]);
        int internal_runs = std::stoi(argv[3]);
        const char *metrics = argv[4];

        for (int i = 0; i < internal_runs; i++) {
            void *context = measure_start(metrics);
            run_benchmark(degree, x);
            measure_stop(context);
        }

        return 0;
    }
arguments: [1000, 0.5]
compile_options: [-pipe, -O3, -march=native, -fomit-frame-pointer]
expected_stdout: !!binary MS4zODYyOTQK
