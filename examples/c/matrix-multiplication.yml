name: matrix-multiplication
language: c
description: |
    Create two square matrices of size N×N.
    Each cell within these two matrices will be initialized with the sum of their row and column indices.
    Multiply the two matrices and output the contents of the last cell.
code: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <green.h>

    void run_benchmark(int n) {
        double *A = malloc(n * n * sizeof(double));
        double *B = malloc(n * n * sizeof(double));
        double *C = malloc(n * n * sizeof(double));

        for (int i = 0; i < n; i++) {
            for (int j = 0; j < n; j++) {
                A[i*n + j] = B[i*n + j] = i + j;
            }
        }

        double total_result = 0.0;
        for (int r = 0; r < 1000; r++) {
            for (int i = 0; i < n; i++) {
                for (int j = 0; j < n; j++) {
                    double sum = 0.0;
                    for (int k = 0; k < n; k++) {
                        sum += A[i*n + k] * B[k*n + j];
                    }
                    C[i*n + j] = sum;
                }
            }
            total_result += C[n*n - 1];
        }

        free(A);
        free(B);
        free(C);
        printf("%.0f\n", total_result / 1000);
    }

    int main(int argc, char **argv) {
        if (argc < 4) {
            fprintf(stderr, "Usage: %s <n> <internal_runs> <metrics>\n", argv[0]);
            return 1;
        }

        int n = atoi(argv[1]);
        int internal_runs = atoi(argv[2]);
        const char *metrics = argv[3];

        for (int i = 0; i < internal_runs; i++) {
            void *context = measure_start(metrics);
            run_benchmark(n);
            measure_stop(context);
        }

        return 0;
    }
arguments: [200]
compile_options: [-pipe, -O3, -march=native, -fomit-frame-pointer]
expected_stdout: !!binary MTg0ODcxMDAK
libgreen: true
---
name: optimized

