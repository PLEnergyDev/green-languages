name: matrix-multiplication
language: rust
description: |
    Create two square matrices of size N×N.
    Each cell within these two matrices will be initialized with the sum of their row and column indices.
    Multiply the two matrices and output the contents of the last cell.
code: |
    fn main() {
        let args: Vec<String> = std::env::args().skip(1).collect();
        let n: usize = args.get(0)
            .expect("Missing argument")
            .parse()
            .expect("Invalid integer");

        let mut a = vec![0.0; n * n];
        let mut b = vec![0.0; n * n];
        let mut c = vec![0.0; n * n];

        for i in 0..n {
            for j in 0..n {
                let val = (i + j) as f64;
                a[i * n + j] = val;
                b[i * n + j] = val;
            }
        }

        let mut result: f64 = 0.0f64;
        for _ in 0..1000 {
            for i in 0..n {
                for j in 0..n {
                    let mut sum = 0.0f64;
                    for k in 0..n {
                        sum += a[i * n + k] * b[k * n + j];
                    }
                    c[i * n + j] = sum;
                }
            }
            result += c[n * n - 1];
        }

        println!("{:.0}", result / 1000.0);
    }
arguments: [200]
compile_options: [--release]
expected_stdout: !!binary MTg0ODcxMDAK
