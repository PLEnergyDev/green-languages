name: matrix-multiplication
language: cpp
description: |
    Create two square matrices of size N×N.
    Each cell within these two matrices will be initialized with the sum of their row and column indices.
    Multiply the two matrices and output the contents of the last cell.
code: |
    #include <iostream>
    #include <vector>

    int main(int argc, char **argv) {
        int n = std::stoi(argv[1]);

        std::vector<double> A(n * n);
        std::vector<double> B(n * n);
        std::vector<double> C(n * n);

        for (int i = 0; i < n; i++) {
            for (int j = 0; j < n; j++) {
                A[i*n + j] = B[i*n + j] = i + j;
            }
        }

        double result = 0.0;
        for (int r = 0; r < 1000; r++) {
            for (int i = 0; i < n; i++) {
                for (int j = 0; j < n; j++) {
                    double sum = 0.0;
                    for (int k = 0; k < n; k++) {
                        sum += A[i*n + k] * B[k*n + j];
                    }
                    C[i*n + j] = sum;
                }
            }
            result += C[n*n - 1];
        }

        std::cout << static_cast<int>(result / 1000) << std::endl;
        return 0;
    }
arguments: [200, 1000]
compile_options: [-pipe, -O3, -march=native, -fomit-frame-pointer]
expected_stdout: !!binary MTg0ODcxMDAK
